name: Render Video

on:
  workflow_dispatch:
    inputs:
      video_name:
        description: 'Video folder name'
        required: true
        default: 'groovy-commutator'
        type: string
      quality:
        description: 'Render quality'
        required: true
        default: 'low'
        type: choice
        options:
        - low
        - medium
        - high

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg texlive-full libcairo2-dev libpango1.0-dev
          pip install manim
      
      - name: Render scenes
        run: |
          VIDEO_PATH="videos/${{ github.event.inputs.video_name }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          case "$QUALITY" in
            low) FLAGS="-ql" ;;
            medium) FLAGS="-qm" ;;
            high) FLAGS="-qh" ;;
          esac
          
          cd "$VIDEO_PATH"
          manim $FLAGS script.py
      
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.event.inputs.video_name }}
          path: media/videos/**/*.mp4
