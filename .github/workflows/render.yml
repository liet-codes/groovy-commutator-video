name: Render Video

on:
  workflow_dispatch:
    inputs:
      video_name:
        description: 'Video folder name'
        required: true
        default: 'groovy-commutator'
        type: string
      quality:
        description: 'Render quality (low, medium, high)'
        required: true
        default: 'low'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Render with Manim
        uses: MengAiDev/manim-video-renderer@v1
        with:
          file: 'videos/${{ github.event.inputs.video_name }}/script.py'
          quality: '${{ github.event.inputs.quality }}'
          output_dir: 'rendered'
      
      - uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.event.inputs.video_name }}
          path: rendered/**/*.mp4
